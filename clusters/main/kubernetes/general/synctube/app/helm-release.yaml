apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: synctube
    namespace: synctube
spec:
    interval: 5m
    chart:
        spec:
            # renovate: registryUrl=https://charts.truechartsoci.org
            chart: synctube
            version: 9.2.2
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
            interval: 5m
    install:
        createNamespace: true
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
      credentials:
        s3:
          type: s3
          url: "${S3_URL}"
          bucket: "${S3_BUCKET}"
          accessKey: "${S3_ID}"
          secretKey: "${S3_KEY}"
          encrKey: "${S3_ENCRYPTION_KEY}"
      ingress:
        main:
          enabled: true
          integrations:
            traefik:
              enabled: true
              entrypoints:
              - websecure
            certManager:
              enabled: true
              certificateIssuer: domain-0-le-prod
          hosts:
            - host: sync.${DOMAIN_0}
              paths:
                - path: /
                  pathType: Prefix
      persistence:
        storageconfig:
          volsync:
          - name: storageconfig
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true