apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: teamspeak3
    namespace: teamspeak3
spec:
    interval: 5m
    chart:
        spec:
            # renovate: registryUrl=https://charts.truechartsoci.org
            chart: teamspeak3
            version: 12.2.2
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
            interval: 5m
    install:
        createNamespace: true
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
      global:
        stopAll: false
      credentials:
        s3:
          type: s3
          url: "${S3_URL}"
          bucket: "${S3_BUCKET}"
          accessKey: "${S3_ID}"
          secretKey: "${S3_KEY}"
          encrKey: "${S3_ENCRYPTION_KEY}"
      service:
        main:
          loadBalancerIP: ${TEAMSPEAK3_IP}
          type: LoadBalancer
      workload:
        main:
          podSpec:
            containers:
              main:
                env:
                  TS3SERVER_DB_CLIENTKEEPDAYS: 90
                  TS3SERVER_QUERY_PROTOCOLS: raw
      persistence:
        config:
          volsync:
            - name: config
              type: restic
              credentials: s3
              dest:
                enabled: true
              src:
                enabled: true
        data:
          volsync:
            - name: data
              type: restic
              credentials: s3
              dest:
                enabled: true
              src:
                enabled: true
